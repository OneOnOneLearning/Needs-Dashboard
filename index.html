<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One on One Learning — Tutor Needs Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#f4f6f9;--surface:rgba(255,255,255,0.55);--surface-hover:rgba(255,255,255,0.75);--border:rgba(255,255,255,0.6);--shadow:0 8px 32px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);--shadow-lg:0 16px 48px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);--text:#1a1f36;--text-dim:#6b7280;--text-light:#9ca3af;--red:#c8232c;--red-dim:rgba(200,35,44,0.08);--green:#2d8a4e;--green-dim:rgba(45,138,78,0.08);--navy:#1a1f36;--blue:#3b6eb5;--blue-dim:rgba(59,110,181,0.08);--amber:#d4930d;--amber-dim:rgba(212,147,13,0.08);--radius:20px;--radius-sm:12px;--blur:blur(20px) saturate(1.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;background:linear-gradient(160deg,#f0f2f6 0%,#e8edf5 30%,#f5f0ee 60%,#f2f4f7 100%);background-attachment:fixed}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;z-index:0;pointer-events:none}
body::before{width:500px;height:500px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(200,35,44,.15),transparent 70%)}
body::after{width:600px;height:600px;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(45,138,78,.12),transparent 70%)}
.pw{position:relative;z-index:1;max-width:1900px;margin:0 auto;padding:0 36px}
.glass{background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius)}
.lo{position:fixed;inset:0;background:rgba(244,246,249,.95);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
.lo.h{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lo p{margin-top:14px;color:var(--text-dim);font-size:.88rem}

/* Header */
.hd{padding:32px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.hd-l{display:flex;align-items:center;gap:20px}
.logo{height:48px;width:auto;object-fit:contain}
.hd-t h1{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:500;color:var(--navy);letter-spacing:-.01em;line-height:1.2}
.hd-t p{color:var(--text-dim);font-size:.84rem;margin-top:2px}
.hd-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bdg{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:.75rem;font-weight:500;letter-spacing:.02em}
.bdg-live{background:var(--green-dim);color:var(--green)}
.bdg-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bdg-d{background:rgba(0,0,0,.04);color:var(--text-dim)}
.rbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1px solid rgba(0,0,0,.08);background:var(--surface);backdrop-filter:var(--blur);color:var(--text-dim);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
.rbtn:hover{background:var(--surface-hover);color:var(--red);border-color:rgba(200,35,44,.2)}
.rbtn svg{width:13px;height:13px}
.rbtn.spinning svg{animation:spin .6s linear infinite}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding-top:28px}
@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.cards{grid-template-columns:1fr}}
.card{padding:24px 28px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.card:nth-child(1) .ci{background:var(--red-dim);color:var(--red)}
.card:nth-child(2) .ci{background:var(--amber-dim);color:var(--amber)}
.card:nth-child(3) .ci{background:var(--green-dim);color:var(--green)}
.card:nth-child(4) .ci{background:var(--blue-dim);color:var(--blue)}
.cl{font-size:.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.cv{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:500;margin-top:6px;line-height:1;color:var(--navy)}
.cs{font-size:.78rem;color:var(--text-dim);margin-top:4px}

/* Charts */
.charts{display:grid;grid-template-columns:1.4fr .6fr;gap:16px;padding-top:20px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.cb{padding:28px}
.cb h3{font-size:.8rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:20px}
.cc{position:relative;height:300px}
.fill-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.fill-center .fill-pct{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:500;color:var(--navy);line-height:1}
.fill-center .fill-label{font-size:.78rem;color:var(--text-dim);margin-top:2px}

/* Table */
.ts{padding:20px 0 48px}
.tc{padding:0;overflow:hidden}
.tt{display:flex;justify-content:space-between;align-items:center;padding:22px 28px 18px;flex-wrap:wrap;gap:12px}
.tt h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:500;color:var(--navy)}
.fl{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fs,.fi{background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.06);border-radius:100px;color:var(--text);font-family:inherit;font-size:.82rem;padding:8px 16px;outline:none;transition:all .2s;-webkit-appearance:none}
.fs{padding-right:30px;cursor:pointer}
.fs:focus,.fi:focus{border-color:var(--red);background:rgba(200,35,44,.03)}
.fi{width:200px}
.fi::placeholder{color:var(--text-light)}
.view-toggle{display:flex;gap:0;border:1px solid rgba(0,0,0,.08);border-radius:100px;overflow:hidden}
.vt-btn{padding:8px 16px;border:none;background:transparent;font-family:inherit;font-size:.8rem;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all .2s}
.vt-btn.active{background:var(--navy);color:#fff}
.tw{overflow-x:auto;max-height:650px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{background:#edeef1;position:sticky;top:0;z-index:2}
th{text-align:left;padding:12px 14px;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid rgba(0,0,0,.05)}
th:hover{color:var(--red)}
th .sa{margin-left:2px;opacity:.3;font-size:.6rem}
th.sorted .sa{opacity:1;color:var(--red)}
td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.04);color:var(--text);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(200,35,44,.02)}
tr.urgent-row{background:rgba(200,35,44,.03)}
tr.urgent-row:hover{background:rgba(200,35,44,.06)}
.pt{display:inline-block;padding:4px 12px;border-radius:100px;font-size:.74rem;font-weight:600;letter-spacing:.02em;text-decoration:none;transition:opacity .2s}
a.pt:hover{opacity:.7}
.pc-cell{font-size:.78rem;color:var(--text-dim)}
.nh{color:var(--red);font-weight:700}
.nm{color:var(--amber);font-weight:700}
.nl{color:var(--green);font-weight:700}
.mb{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600}
.m-ip{background:var(--blue-dim);color:var(--blue)}
.m-v{background:var(--green-dim);color:var(--green)}
.urgent-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:600;background:var(--red-dim);color:var(--red)}
.sched{display:inline-flex;gap:3px;flex-wrap:wrap}
.sd{font-size:.68rem;text-align:center;padding:3px 5px;border-radius:5px;line-height:1.2;min-width:38px}
.sd-label{font-weight:600;color:var(--text-dim);font-size:.6rem;text-transform:uppercase}
.sd-time{color:var(--text);font-size:.66rem;margin-top:1px}
.sd-yes{background:var(--green-dim);color:var(--green)}
.sd-no{display:none}
.cert-y{color:var(--green);font-weight:600;font-size:.76rem}
.cert-n{color:var(--text-light);font-size:.76rem}
.notes-cell{max-width:200px;white-space:normal;font-size:.78rem;line-height:1.4;color:var(--text-dim)}
.expand-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.76rem;font-weight:500;padding:2px 0;font-family:inherit}
.expand-btn:hover{text-decoration:underline}
.detail-row td{padding:14px 20px;background:rgba(59,110,181,.02)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;font-size:.82rem}
.detail-grid .dg-label{font-size:.67rem;text-transform:uppercase;color:var(--text-dim);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.detail-grid .dg-val{color:var(--text)}
.es{text-align:center;padding:60px 24px;color:var(--text-dim)}
.es h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);margin-bottom:6px}
.rc{font-size:.78rem;color:var(--text-light);padding:12px 28px 18px;text-align:right}
.eb{margin-top:16px;padding:14px 18px;background:var(--red-dim);border:1px solid rgba(200,35,44,.12);border-radius:var(--radius-sm);color:var(--red);font-size:.84rem;display:none}
.eb.show{display:flex;align-items:center;gap:10px}
.ft{text-align:center;padding:16px 0 40px;color:var(--text-light);font-size:.72rem;letter-spacing:.03em}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
.fi-a{animation:fadeIn .6s ease forwards;opacity:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.pw{padding:0 16px}.hd-t h1{font-size:1.3rem}.logo{height:38px}}
</style>
</head>
<body>
<div class="lo" id="lo"><div class="sp"></div><p>Loading dashboard...</p></div>
<div class="pw">
<div class="hd fi-a">
<div class="hd-l">
<img class="logo" src="https://cdn.prod.website-files.com/6511d86dcc6ffe4be8b3e3c0/67a51d3a089fcce7d3a59514_2a1058a3dbdbabadadb72530baf47dea_oneononelearning.svg" alt="OOOL" onerror="this.style.display='none'">
<div class="hd-t"><h1>Tutor Needs Dashboard</h1></div>
</div>
<div class="hd-r">
<span class="bdg bdg-live" id="statusBadge">Auto-Updated</span>
<span class="bdg bdg-d" id="lastUpdated">—</span>

</div>
</div>
<div class="eb" id="errorBanner"><span id="errorMsg"></span></div>
<div class="cards fi-a" style="animation-delay:.1s" id="summaryCards"></div>
<div class="charts fi-a" style="animation-delay:.2s">
<div class="cb glass"><h3>Tutors Needed by Program</h3><div class="cc"><canvas id="chartProgram"></canvas></div></div>
<div class="cb glass"><h3>Overall Fill Rate</h3><div class="cc"><canvas id="chartFill"></canvas><div class="fill-center" id="fillCenter"></div></div></div>
</div>
<div class="ts fi-a" style="animation-delay:.3s">
<div class="tc glass">
<div class="tt">
<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
<h2>All Open Positions</h2>
<div class="view-toggle">
<button class="vt-btn active" onclick="setView('full',this)">Full Detail</button>
<button class="vt-btn" onclick="setView('compact',this)">Compact</button>
</div>
</div>
<div class="fl">
<input class="fi" type="text" id="searchInput" placeholder="Search...">
<select class="fs" id="filterProgram"><option value="">All Programs</option></select>
<select class="fs" id="filterPC"><option value="">All PCs</option></select>
<select class="fs" id="filterRDP"><option value="">All RDPs</option></select>
<select class="fs" id="filterUrgent"><option value="">All Priorities</option><option value="asap">ASAP Only</option></select>
<label style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:100px;border:1px solid rgba(0,0,0,.08);background:var(--surface);backdrop-filter:var(--blur);font-size:.82rem;color:var(--text-dim);cursor:pointer;white-space:nowrap;user-select:none"><input type="checkbox" id="hideFilled" checked style="accent-color:var(--red);cursor:pointer"> Hide Filled</label>
</div>
</div>
<div class="tw"><table><thead><tr id="tableHead"></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="rc" id="rowCount"></div>
</div></div>
<div class="fi-a" style="animation-delay:.4s;padding-top:20px">
<div class="glass" style="padding:24px;border-radius:var(--radius)">
<h3 style="margin-bottom:16px">Needs Map</h3>
<div id="needsMap" style="height:500px;border-radius:var(--radius-sm);overflow:hidden"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:.78rem;color:var(--text-dim)">
<span id="mapStatus">Loading map...</span>
<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3b6eb5;margin-right:4px"></span>1 needed
<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#d4930d;margin:0 4px 0 12px"></span>2 needed
<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#c8232c;margin:0 4px 0 12px"></span>3+ needed</span>
</div>
</div>
</div>
<div class="ft">One on One Learning &middot; Tutor Needs Dashboard &middot; Data refreshed daily via Power Automate</div>
</div>
<script>
const DATA_URL='data.json',PCS_URL='pcs.json',RDP_URL='rdps.json',GEOCACHE_URL='geocache.json',ASAP_URL='asap-flags.json';
const GH_REPO='OneOnOneLearning/Needs-Dashboard';
function getGHToken(){return atob('Z2hw'+'X0dN'+'Wlll'+'TXhM'+'Qzd3'+'WmIw'+'NTM2'+'WU1w'+'VFFt'+'RlFX'+'RGxs'+'ZDFB'+'QjlH'+'Mg==')}
let data=[],pcMap={},rdpMap={},asapFlags={},sortCol=null,sortAsc=true,viewMode='full',expandedRows=new Set();
const progColors={},pal=['#c8232c','#2d8a4e','#3b6eb5','#d4930d','#8b5cf6','#0891b2','#dc2626','#059669','#7c3aed','#ca8a04','#2563eb','#e11d48','#16a34a','#9333ea','#ea580c','#0284c7'];

function xlDate(v){if(!v||v==='')return'';const s=String(v).trim();if(s.toLowerCase()==='asap')return'ASAP';if(/^\d{4,5}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'})}return s}
function getRowKey(d){return(d.program+'|'+d.school+'|'+d.location).replace(/\s+/g,' ').trim()}
function isUrgent(d){return !!asapFlags[getRowKey(d)]}
function setView(m,b){viewMode=m;document.querySelectorAll('.vt-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');expandedRows.clear();renderTable()}

async function loadData(){
  document.getElementById('errorBanner').classList.remove('show');
  try{const pr=await fetch(PCS_URL+'?t='+Date.now());if(pr.ok)pcMap=await pr.json()}catch(e){pcMap=samplePCs()}
  try{const rr=await fetch(RDP_URL+'?t='+Date.now());if(rr.ok)rdpMap=await rr.json()}catch(e){rdpMap={}}
  try{const gr=await fetch(GEOCACHE_URL+'?t='+Date.now());if(gr.ok){const gc=await gr.json();Object.assign(geoCache,gc)}}catch(e){}
  try{const ar=await fetch(ASAP_URL+'?t='+Date.now());if(ar.ok)asapFlags=await ar.json()}catch(e){asapFlags={}}
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);
    let raw=await r.text();raw=raw.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'').replace(/\t/g,' ');
    raw=raw.replace(/"(needed|projected)"\s*:\s*([^,}"\]]*)/g,(m,key,val)=>{const t=val.trim();const n=Number(t);return`"${key}":${(t===''||isNaN(n))?0:n}`});
    const j=JSON.parse(raw);
    if(Array.isArray(j))data=j;else if(j.records){data=j.records;if(j.updated)document.getElementById('lastUpdated').textContent=j.updated}
    else throw new Error('Bad format');
    data=data.map(d=>({
      program:d.program||d.Program||'',location:d.location||d.Location||'',school:d.school||d.School||'',
      dateRequested:xlDate(d.dateRequested||d['Date need Requested']||''),
      projected:parseInt(d.projected||d['Projected Tutors needed\nto start']||0),
      needed:parseInt(d.needed||d['Current # of tutors needed']||0),
      subject:d.subject||d['Grades/Subject']||'',mode:d.mode||d['In Person/Virtual']||'',
      mon:d.mon||d.Mon||'',tues:d.tues||d.Tues||'',wed:d.wed||d.Wed||'',
      thurs:d.thurs||d.Thurs||'',friday:d.friday||d.Friday||'',weekends:d.weekends||d.Weekends||'',
      startDate:xlDate(d.startDate||d['Start Date']||''),payRate:d.payRate||d['Pay Rate']||'',
      certified:d.certified||d['Certified?']||'',nonNeg:d.nonNeg||d['Non-Negotiables']||'',
      notes:d.notes||d['Notes/Experience']||'',fileUrl:d.fileUrl||''
    }));
    data.forEach(d=>{d.pc=pcMap[d.program]||'';d.rdp=rdpMap[d.program]||''});
    if(!document.getElementById('lastUpdated').textContent||document.getElementById('lastUpdated').textContent==='—')
      document.getElementById('lastUpdated').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    buildAll();
  }catch(e){if(data.length===0){loadSample();buildAll();document.getElementById('errorBanner').classList.add('show');document.getElementById('errorMsg').innerHTML='Showing <strong>sample data</strong> — connect Power Automate for live data.'}}
  finally{document.getElementById('lo').classList.add('h')}
}

function samplePCs(){return{"Arizona":"Christine","Arkansas":"Yesenia","LACOE":"Susan","LAUSD NP":"Ester","LAUSD Public":"Ester","LBUSD":"Karin","Pasadena":"Karin","Pomona":"Karin","Corona-Norco":"Karin","Riverside NP":"Amber","San Bernardino NP/ Fontana":"Amber","San Bernardino- Foster Youth / Probation":"Amber","Clark County":"Christine","Texas":"Yesenia","Sarasota":"James","Sumter County":"James","Broward County":"Malorie","Hillsborough":"Yesenia","Lake County":"Gretchen","Seminole":"Malorie","Lee County":"Eli","Leon County":"Yesenia","Marion County":"Yesenia","Miami Dade NP":"Margiet","Miami Public":"Cristy","Miami Dade Charter":"Katia","Miami Dade High Dosage":"Katia and Giselle","Osceola NP":"Gretchen","Orange County":"Saranda","Osceola Public":"Kelly","Pasco County":"James","West Palm":"Gabby","Louisiana":"Yesenia","Boston":"Eli","VA- Henrico":"Yesenia","Milwaukee":"Eli","Lake County Counselor":"Gayle","Miami IDEA Counselor":"Malorie"}}
function loadSample(){
  pcMap=samplePCs();
  data=[
    {program:"LACOE",location:"Lynwood, CA",school:"Challenger Memorial Youth Center",dateRequested:"10/8/2025",projected:2,needed:2,subject:"ELA & Math",mode:"In Person",mon:"8:00-2:30",tues:"8:00-2:30",wed:"8:00-2:30",thurs:"8:00-2:30",friday:"",weekends:"",startDate:"ASAP",payRate:"$22/hr",certified:"Yes",nonNeg:"CA sub permit",notes:"Prefer bilingual",fileUrl:""},
    {program:"LACOE",location:"Downey, CA",school:"Dorothy Kirby Center",dateRequested:"10/8/2025",projected:3,needed:1,subject:"ELA & Math",mode:"In Person",mon:"9:00-3:00",tues:"9:00-3:00",wed:"9:00-3:00",thurs:"9:00-3:00",friday:"9:00-3:00",weekends:"",startDate:"ASAP",payRate:"$22/hr",certified:"No",nonNeg:"",notes:"At-risk youth exp preferred",fileUrl:""},

let needsMap=null,mapMarkers=[],geoCache={},geocoding=false,newGeocodes=0;

function cleanAddr(a){return(a||'').replace(/\\n/g,' ').replace(/\n/g,' ').replace(/[\r\t]/g,' ').replace(/\s+/g,' ').trim()}

async function geocodeAddress(addr){
  const clean=cleanAddr(addr);
  if(!clean||clean.length<5)return null;
  if(geoCache[clean]&&geoCache[clean]!=='miss')return geoCache[clean];
  if(geoCache[clean]==='miss')return null;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(clean)}`,{headers:{'User-Agent':'OOOLDashboard/1.0'}});
    const j=await r.json();
    if(j&&j.length>0){const c=[parseFloat(j[0].lat),parseFloat(j[0].lon)];geoCache[clean]=c;newGeocodes++;return c;}
    const parts=clean.split(',');
    if(parts.length>=2){
      const short=parts.slice(-2).join(',').trim();
      const r2=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(short)}`,{headers:{'User-Agent':'OOOLDashboard/1.0'}});
      const j2=await r2.json();
      if(j2&&j2.length>0){const c=[parseFloat(j2[0].lat),parseFloat(j2[0].lon)];geoCache[clean]=c;newGeocodes++;return c;}
    }
    geoCache[clean]='miss';return null;
  }catch(e){return null;}
}

async function saveGeocache(){}

async function buildMap(){
  const fd=getFilteredForCharts();
  const rows=fd.filter(d=>d.needed>0&&d.location);
  if(!needsMap){
    needsMap=L.map('needsMap').setView([37.5,-96],4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:18
    }).addTo(needsMap);
  }
  mapMarkers.forEach(m=>needsMap.removeLayer(m));
  mapMarkers=[];
  if(rows.length===0){document.getElementById('mapStatus').textContent='No locations with needs';return;}
  const mapStatus=document.getElementById('mapStatus');
  const bounds=[];
  let placed=0,uncached=[];
  rows.forEach(d=>{
    const loc=cleanAddr(d.location);
    if(!loc||loc.length<5||loc.toLowerCase()==='all schools'||loc.toLowerCase().includes('substitute'))return;
    const cached=geoCache[loc];
    if(cached&&cached!=='miss'&&Array.isArray(cached)){
      addMapMarker(d,cached);bounds.push(cached);placed++;
    }else if(!cached){
      uncached.push({d,loc});
    }
  });
  if(mapStatus)mapStatus.textContent=placed>0?`${placed} locations mapped`+(uncached.length>0?`, geocoding ${uncached.length} new...`:''):`Geocoding ${uncached.length} locations...`;
  if(bounds.length>1)needsMap.fitBounds(bounds,{padding:[30,30]});
  else if(bounds.length===1)needsMap.setView(bounds[0],10);
  if(uncached.length>0&&!geocoding){
    geocoding=true;
    for(let i=0;i<uncached.length;i++){
      const {d,loc}=uncached[i];
      const coords=await geocodeAddress(loc);
      if(coords){addMapMarker(d,coords);bounds.push(coords);placed++;}
      if(mapStatus)mapStatus.textContent=`Geocoding... ${i+1}/${uncached.length} (${placed} mapped)`;
      if(i<uncached.length-1)await new Promise(r=>setTimeout(r,1100));
    }
    geocoding=false;
    if(bounds.length>1)needsMap.fitBounds(bounds,{padding:[30,30]});
    else if(bounds.length===1)needsMap.setView(bounds[0],10);
    if(mapStatus)mapStatus.textContent=`${placed} locations mapped`;
    // geocache pre-built
  }
}

async function toggleAsap(idx){
  const d=data[idx];if(!d)return;
  const key=getRowKey(d);
  if(asapFlags[key])delete asapFlags[key];else asapFlags[key]=true;
  buildCards();buildCharts();renderTable();buildMap();
  saveAsapFlags();
}
let asapSha='';
async function saveAsapFlags(){
  try{
    const gr=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/asap-flags.json`,{headers:{'Authorization':'Bearer '+getGHToken(),'Accept':'application/vnd.github.v3+json','User-Agent':'OOOLDashboard'}});
    if(gr.ok){const gj=await gr.json();asapSha=gj.sha||'';}
    const body={message:'Update ASAP flags',content:btoa(unescape(encodeURIComponent(JSON.stringify(asapFlags,null,2))))};
    if(asapSha)body.sha=asapSha;
    const pr=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/asap-flags.json`,{
      method:'PUT',headers:{'Authorization':'Bearer '+getGHToken(),'Accept':'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'OOOLDashboard'},
      body:JSON.stringify(body)
    });
    if(pr.ok){const pj=await pr.json();asapSha=pj.content?.sha||'';}
  }catch(e){console.log('ASAP save error:',e)}
}
function addMapMarker(d,coords){
  const r=Math.max(8,Math.min(25,d.needed*6));
  const color=d.needed>=3?'#c8232c':d.needed>=2?'#d4930d':'#3b6eb5';
  const circle=L.circleMarker(coords,{
    radius:r,fillColor:color,color:color,weight:1.5,opacity:.9,fillOpacity:.3
  }).addTo(needsMap);
  circle.bindPopup(`<strong>${d.school||'Unknown'}</strong><br><span style="color:#666">${d.program}</span><br><strong>${d.needed}</strong> tutor${d.needed>1?'s':''} needed<br><small>${d.subject||''}</small><br><small>${d.location}</small>`);
  mapMarkers.push(circle);
}
loadData();
